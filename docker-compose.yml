version: '3.8'

services:
  web:
    build: .
    ports:
      - "3000:3000"
    restart: always
    environment:
      - DATABASE_URL=postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-pettycash}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - UPLOAD_BASE_PATH=/app/uploads
      - FILE_SIGNING_SECRET=${FILE_SIGNING_SECRET}
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-pettycash}
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
